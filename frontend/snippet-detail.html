<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snippet Details | DRF Snippets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="icon">&#128187;</span> DRF Snippets
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                &#9776;
            </button>
            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="snippets.html" class="nav-link">Snippets List</a>
                <a href="create-snippet.html" class="nav-link">Create Snippet</a>
                <a href="users.html" class="nav-link">Users</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="back-nav">
            <a href="snippets.html" class="back-link">&larr; Back to Snippets List</a>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer" class="alert-container hidden">
            <span id="alertMessage"></span>
            <button class="alert-close" id="alertClose">&times;</button>
        </div>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-container">
            <div class="spinner"></div>
            <p>Loading snippet details...</p>
        </div>

        <!-- Detail Container -->
        <article id="detailCard" class="detail-card hidden">
            <header class="detail-header">
                <div>
                    <h1 id="snippetTitle" class="detail-title">Loading Title...</h1>
                    <div class="snippet-meta">
                        <span id="snippetLang" class="badge badge-lang">--</span>
                        <span id="snippetStyle" class="badge badge-style">--</span>
                        <span id="snippetLinenos" class="badge badge-linenos">--</span>
                    </div>
                </div>
                <div class="action-buttons">
                    <a href="#" id="editBtn" class="btn btn-edit">Edit Snippet</a>
                    <button id="highlightBtn" class="btn btn-highlight">View Highlighted</button>
                    <button id="deleteBtn" class="btn btn-delete">Delete</button>
                </div>
            </header>

            <div class="meta-info-bar">
                <div class="meta-item">
                    <span class="meta-label">&#128119; Snippet ID:</span>
                    <span id="snippetId" class="meta-val">--</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">&#128100; Created By:</span>
                    <span id="snippetOwner" class="meta-val">--</span>
                </div>
            </div>

            <!-- Code Window -->
            <div class="code-window">
                <div class="window-header">
                    <div class="window-dots">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                    </div>
                    <span id="windowTitle" class="window-title">code.py</span>
                    <button id="copyBtn" class="copy-btn">Copy Code</button>
                </div>
                <div class="code-container">
                    <pre><code id="snippetCode">Loading code snippet...</code></pre>
                </div>
            </div>
        </article>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Django REST Snippets. Built for learning API frontend integrations.</p>
    </footer>

    <script type="module" src="js/detail.js"></script>
</body>
</html>
